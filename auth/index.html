<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEFTERWEEVIL - 登录</title>
<link rel="icon" href="/favicon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:system-ui,sans-serif;padding:20px}
  .box{background:#111;padding:40px;border-radius:20px;border:1px solid #333;width:100%;max-width:400px}
  .title{text-align:center;font-size:24px;margin-bottom:30px}
  input{width:100%;padding:14px;background:#222;border:1px solid #444;border-radius:10px;color:#fff;margin-bottom:16px;font-size:16px}
  .btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px}
  .toggle{text-align:center;margin-top:20px;color:#aaa;font-size:14px;cursor:pointer}
  .form{display:none}
  .form.active{display:block}
  .back{color:#aaa;margin-bottom:20px;cursor:pointer}

  .settings-icon{position:fixed;right:24px;bottom:24px;width:50px;height:50px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer;z-index:999;border:1px solid #fff}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000}
  .modal.show{display:flex;align-items:center;justify-content:center}
  .modal-box{background:#111;padding:30px;border-radius:16px;border:1px solid #444;text-align:center}
  .lang-btn{padding:12px 24px;margin:8px;background:#222;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<div class="box">
  <div class="back" onclick="location.href='/'">← 返回</div>
  <h2 class="title" data-lang-text="账号系统,Account System">账号系统</h2>

  <!-- 登录 -->
  <div class="form active" id="loginForm">
    <input type="text" id="loginId" placeholder="ID" data-lang-placeholder="ID,ID">
    <input type="password" id="loginPwd" placeholder="密码" data-lang-placeholder="Password,Password">
    <button class="btn" onclick="login()" data-lang-text="登录,Login">登录</button>
    <div class="toggle" onclick="switchForm('reg')" data-lang-text="没有账号？去注册,No account? Register">没有账号？去注册</div>
  </div>

  <!-- 注册 -->
  <div class="form" id="regForm">
    <input type="text" id="regId" placeholder="设置ID" data-lang-placeholder="Set ID,Set ID">
    <input type="password" id="regPwd" placeholder="设置密码" data-lang-placeholder="Set Password,Set Password">
    <button class="btn" onclick="register()" data-lang-text="注册,Register">注册</button>
    <div class="toggle" onclick="switchForm('login')" data-lang-text="已有账号？去登录,Have account? Login">已有账号？去登录</div>
  </div>
</div>

<div class="settings-icon" onclick="openModal()">⚙️</div>
<div class="modal" id="langModal">
  <div class="modal-box">
    <h3 style="margin-bottom:16px" data-lang-text="选择语言,Language">选择语言</h3>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
</div>

<script>
  let lang = localStorage.getItem('lang') || 'zh';
  function applyLang(){
    document.querySelectorAll('[data-lang-text]').forEach(el=>{const[zh,en]=el.getAttribute('data-lang-text').split(',');el.textContent=lang==='zh'?zh:en})
    document.querySelectorAll('[data-lang-placeholder]').forEach(el=>{const[zh,en]=el.getAttribute('data-lang-placeholder').split(',');el.placeholder=lang==='zh'?zh:en})
  }
  function openModal(){document.getElementById('langModal').classList.add('show')}
  function closeModal(){document.getElementById('langModal').classList.remove('show')}
  function setLang(l){lang=l;localStorage.setItem('lang',l);applyLang();closeModal()}
  document.getElementById('langModal').onclick=e=>e.target===document.getElementById('langModal')&&closeModal();

  function switchForm(mode){
    document.getElementById('loginForm').classList.remove('active')
    document.getElementById('regForm').classList.remove('active')
    document.getElementById(mode+'Form').classList.add('active')
  }

  // 注册
  function register(){
    const id=document.getElementById('regId').value.trim()
    const pwd=document.getElementById('regPwd').value.trim()
    if(!id||!pwd){alert(lang==='zh'?'请输入ID和密码':'Please enter ID and password');return}
    if(localStorage.getItem('user_'+id)){alert(lang==='zh'?'ID已存在':'ID already exists');return}
    localStorage.setItem('user_'+id, JSON.string
