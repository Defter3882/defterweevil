<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEFTERWEEVIL</title>
<link rel="icon" href="/favicon.png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100vw;
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }

  /* 标题 */
  .title {
    font-size: 6vw;
    font-weight: 900;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 12vh;
    padding-left: 0.5em;
    color: #fff;
  }

  /* 开始按钮 */
  .start-btn {
    font-size: 22px;
    padding: 16px 48px;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
  }
  .start-btn:hover {
    background: #fff;
    color: #000;
  }

  /* 全局固定右下角设置按钮 */
  .settings-icon {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 50px;
    height: 50px;
    background: #222;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    z-index: 999;
    border: 1px solid #fff;
  }

  /* 设置弹窗 */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.show {
    display: flex;
  }
  .modal-box {
    background: #111;
    padding: 30px;
    border-radius: 16px;
    border: 1px solid #444;
    text-align: center;
    min-width: 240px;
  }
  .lang-btn {
    padding: 12px 24px;
    margin: 8px;
    background: #222;
    color: #fff;
    border: 1px solid #fff;
    border-radius: 8px;
    cursor: pointer;
  }
  .lang-btn:hover {
    background: #fff;
    color: #000;
  }
</style>
</head>

<body>

  <h1 class="title">DEFTERWEEVIL</h1>
  <a href="/main/" class="start-btn" data-lang-text="开始,START">开始</a>

  <!-- 全局设置按钮（永远在右下角） -->
  <div class="settings-icon" onclick="openModal()">⚙️</div>

  <!-- 语言设置弹窗 -->
  <div class="modal" id="langModal">
    <div class="modal-box">
      <h3 style="margin-bottom:16px;" data-lang-text="选择语言,Language">选择语言</h3>
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>
  </div>

  <script>
    // 读取本地保存的语言，默认中文
    let lang = localStorage.getItem('lang') || 'zh';

    // 所有带 data-lang-text="中文,英文" 的元素会自动切换
    function applyLang() {
      document.querySelectorAll('[data-lang-text]').forEach(el => {
        const [zh, en] = el.getAttribute('data-lang-text').split(',');
        el.textContent = lang === 'zh' ? zh : en;
      });
    }

    function openModal() {
      document.getElementById('langModal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('langModal').classList.remove('show');
    }

    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      applyLang();
      closeModal();
    }

    // 点击弹窗背景关闭
    document.getElementById('langModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('langModal')) closeModal();
    });

    // 初始应用语言
    applyLang();
  </script>

</body>
</html>
