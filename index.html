<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十一中风云</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
  }
  body {
    background: #f7f8fa;
    padding: 30px 20px;
  }
  .page-title {
    font-size: 26px;
    margin-bottom: 30px;
    text-align: center;
    color: #222;
  }
  .list {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover {
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .card-info {
    padding: 14px;
  }
  .card-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.4;
  }
</style>
</head>

<body>

<h1 class="page-title">十三班</h1>

<div class="list">
  <!-- 人物1 -->
  <a class="card" href="people1.html">
    <img src="people1.jpg" alt="人物1">
    <div class="card-info">
      <div class="card-name">亨爷</div>
      <div class="card-desc">简单一句话简介</div>
    </div>
  </a>

  <!-- 人物2 -->
  <a class="card" href="people2.html">
    <img src="people2.jpg" alt="人物2">
    <div class="card-info">
      <div class="card-name">人物二</div>
      <div class="card-desc">简单一句话简介</div>
    </div>
  </a>

  <!-- 人物3 -->
  <a class="card" href="people3.html">
    <img src="people3.jpg" alt="人物3">
    <div class="card-info">
      <div class="card-name">人物三</div>
      <div class="card-desc">简单一句话简介</div>
    </div>
  </a>

  <!-- 你可以无限复制上面这一块 -->
</div>

</body>
</html>
