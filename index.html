<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEFTERWEEVIL</title>
<link rel="icon" href="/favicon.png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100vw;
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* 大标题艺术效果 */
  .title {
    font-size: 6vw;
    font-weight: 900;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 12vh;
    padding-left: 0.5em; /* 抵消字间距 */
    color: #fff;
  }

  /* 开始按钮 */
  .start-btn {
    font-size: 22px;
    padding: 16px 48px;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
  }

  .start-btn:hover {
    background: #fff;
    color: #000;
  }
</style>
</head>

<body>

  <div class="title">DEFTERWEEVIL</div>
  <a href="/main/" class="start-btn">开始</a>

</body>
</html>
