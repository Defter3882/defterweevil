<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>假想装机馆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    /* 顶部导航 */
    .top-nav {
      background: #1a1a1d;
      color: white;
      display: flex;
      padding: 15px 30px;
      gap: 30px;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .top-nav a {
      color: white;
      text-decoration: none;
      cursor: pointer;
    }
    .top-nav a:hover {
      color: #00aaff;
    }

    /* 主体布局 */
    .container {
      display: flex;
      max-width: 1600px;
      margin: 30px auto;
      padding: 0 20px;
    }

    /* 左侧筛选 */
    .filter {
      width: 240px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      position: sticky;
      top: 100px;
      height: fit-content;
    }
    .filter h3 {
      margin-bottom: 15px;
      font-size: 16px;
    }
    .filter-item {
      margin: 8px 0;
      font-size: 14px;
    }

    /* 右侧商品区 - 方形紧凑布局 */
    .products {
      flex: 1;
      padding-left: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    /* 方形商品卡片 */
    .card {
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      transition: 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    /* 方形图片区域 */
    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .card h3 {
      font-size: 13px;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .price {
      font-size: 14px;
      color: #c00;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .buy-btn {
      margin-top: auto;
      background: #0066cc;
      color: white;
      border: none;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .buy-btn:hover {
      background: #0055aa;
    }

    /* 页面切换 */
    .page { display: none; }
    .page.active { display: block; width: 100%; }

    /* 仓库 */
    .warehouse-box {
      padding: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <!-- 顶部导航 -->
  <div class="top-nav">
    <a onclick="showPage('shop')">商店</a>
    <a onclick="showPage('warehouse')">仓库</a>
    <a id="money">资金：100000 元</a>
  </div>

  <!-- 商店页面 -->
  <div id="shop" class="page active">
    <div class="container">
      <!-- 左侧筛选 -->
      <div class="filter">
        <h3>主板筛选</h3>
        <div class="filter-item"><label><input type="checkbox"> DDR5</label></div>
        <div class="filter-item"><label><input type="checkbox"> X870 芯片组</label></div>
        <div class="filter-item"><label><input type="checkbox"> PCIe 5.0</label></div>
        <div class="filter-item"><label><input type="checkbox"> M.2 插槽</label></div>
        <div class="filter-item"><label><input type="checkbox"> E-ATX</label></div>
        <div class="filter-item"><label><input type="checkbox"> WiFi 7</label></div>
      </div>

      <!-- 方形商品列表 -->
      <div class="products">
        <div class="card">
          <div class="card-img">
            <img src="https://picsum.photos/300/300" alt="主板">
          </div>
          <div class="card-body">
            <h3>ROG CROSSHAIR X870E EXTREME</h3>
            <div class="price">10000 元</div>
            <button class="buy-btn" onclick="buy(event)">购买</button>
          </div>
        </div>

        <!-- 复制下面卡片可以快速添加更多商品 -->
        <div class="card">
          <div class="card-img">
            <img src="https://picsum.photos/300/300?random=2" alt="主板">
          </div>
          <div class="card-body">
            <h3>ROG CROSSHAIR X870E EXTREME</h3>
            <div class="price">10000 元</div>
            <button class="buy-btn" onclick="buy(event)">购买</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img">
            <img src="https://picsum.photos/300/300?random=3" alt="主板">
          </div>
          <div class="card-body">
            <h3>ROG CROSSHAIR X870E EXTREME</h3>
            <div class="price">10000 元</div>
            <button class="buy-btn" onclick="buy(event)">购买</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img">
            <img src="https://picsum.photos/300/300?random=4" alt="主板">
          </div>
          <div class="card-body">
            <h3>ROG CROSSHAIR X870E EXTREME</h3>
            <div class="price">10000 元</div>
            <button class="buy-btn" onclick="buy(event)">购买</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img">
            <img src="https://picsum.photos/300/300?random=5" alt="主板">
          </div>
          <div class="card-body">
            <h3>ROG CROSSHAIR X870E EXTREME</h3>
            <div class="price">10000 元</div>
            <button class="buy-btn" onclick="buy(event)">购买</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 仓库页面 -->
  <div id="warehouse" class="page">
    <div class="warehouse-box">
      <h2>我的仓库</h2>
      <div id="warehouse-list" style="margin-top:20px;"></div>
    </div>
  </div>

  <script>
    let money = 100000;
    let warehouse = [];

    // 切换页面
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    // 更新资金
    function updateMoney() {
      document.getElementById('money').innerText = `资金：${money} 元`;
    }

    // 购买
    function buy(e) {
      e.stopPropagation();
      const price = 10000;
      if (money >= price) {
        money -= price;
        warehouse.push("ROG CROSSHAIR X870E EXTREME");
        updateMoney();
        updateWarehouse();
        alert("购买成功！已存入仓库");
      } else {
        alert("资金不足！");
      }
    }

    // 更新仓库
    function updateWarehouse() {
      const list = document.getElementById('warehouse-list');
      list.innerHTML = warehouse.length === 0
        ? "<p>仓库空空如也</p>"
        : warehouse.map((item, i) =>
          `<div style="padding:10px; border:1px solid #ddd; margin:6px 0">${i+1}. ${item}</div>`
        ).join('');
    }

    updateMoney();
    updateWarehouse();
  </script>
</body>
</html>
